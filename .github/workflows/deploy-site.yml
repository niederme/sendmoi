name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Validate deploy scripts
        run: bash -n scripts/deploy-site.sh scripts/set-site-url.sh

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ssh.suckahs.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host ssh.suckahs.org
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Deploy site
        env:
          DEPLOY_IDENTITY_FILE: ~/.ssh/deploy_key
        run: ./scripts/deploy-site.sh
