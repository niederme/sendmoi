<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="48%" stop-color="#ede0fe"/>
      <stop offset="100%" stop-color="#dbc6fd"/>
    </linearGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#1a0336"/>
    </linearGradient>
    <linearGradient id="button" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" fill="url(#bg)"/>
  <circle cx="1110" cy="310" r="240" fill="#7c3aed" opacity="0.09"/>
  <circle cx="190" cy="2490" r="270" fill="#a855f7" opacity="0.07"/>

  <!-- Wordmark -->
  <text x="110" y="250" fill="#4c1d95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="6">MAILMOI</text>

  <!-- Headline -->
  <text x="110" y="470" fill="#1e0a4f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="136" font-weight="800">One Address.</text>
  <text x="110" y="610" fill="#1e0a4f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="136" font-weight="800">All Your Reads.</text>
  <text x="110" y="730" fill="#5b3d8a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">Save a default recipient once. Every link you</text>
  <text x="110" y="798" fill="#5b3d8a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">share routes there automatically—no retyping.</text>

  <!-- Phone frame outer -->
  <rect x="145" y="930" width="1000" height="1440" rx="120" fill="#0d1734"/>
  <!-- Phone frame inner screen -->
  <rect x="181" y="970" width="928" height="1360" rx="86" fill="#faf5ff"/>
  <!-- notch/pill -->
  <rect x="500" y="1005" width="290" height="18" rx="9" fill="#d8d0f8"/>

  <!-- Nav title -->
  <text x="245" y="1118" fill="#3b1a6e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="54" font-weight="700">MailMoi</text>

  <!-- Account section card -->
  <rect x="245" y="1168" width="800" height="354" rx="38" fill="#ffffff" stroke="#ddd5f6" stroke-width="6"/>
  <!-- Section header -->
  <text x="285" y="1236" fill="#7b5cb8" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="3">ACCOUNT</text>
  <!-- Default recipient field -->
  <text x="285" y="1292" fill="#1e0a4f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="38" font-weight="600">Default Recipient</text>
  <rect x="285" y="1312" width="720" height="58" rx="18" fill="#ede9ff"/>
  <text x="316" y="1352" fill="#3b1a6e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30">founder@studio.com</text>
  <!-- Save button -->
  <rect x="285" y="1390" width="720" height="64" rx="22" fill="url(#button)"/>
  <text x="410" y="1433" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">SAVE DEFAULT RECIPIENT</text>
  <!-- Signed-in row -->
  <text x="285" y="1500" fill="#7b5cb8" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="32">From</text>
  <text x="376" y="1500" fill="#1e0a4f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="32" font-weight="600">your.account@gmail.com</text>

  <!-- Success badge -->
  <rect x="245" y="1558" width="800" height="116" rx="38" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="6"/>
  <circle cx="306" cy="1616" r="26" fill="#10b981"/>
  <!-- checkmark path -->
  <path d="M294 1616 L303 1626 L320 1607" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="352" y="1608" fill="#065f46" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Default recipient saved.</text>
  <text x="352" y="1650" fill="#059669" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">Share extension will auto-fill this address.</text>

  <!-- Share extension dark preview -->
  <rect x="245" y="1714" width="800" height="296" rx="38" fill="url(#hero)"/>
  <text x="285" y="1782" fill="#c4b5fd" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">NEXT SHARE</text>
  <text x="285" y="1838" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Design systems that actually ship faster</text>
  <text x="285" y="1890" fill="#a78bfa" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28">To: founder@studio.com  ·  Auto-filled</text>
  <rect x="285" y="1918" width="700" height="60" rx="20" fill="url(#success)"/>
  <text x="410" y="1960" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="700">SENT AUTOMATICALLY</text>

  <!-- Status section -->
  <rect x="245" y="2050" width="800" height="174" rx="38" fill="#ffffff" stroke="#ddd5f6" stroke-width="6"/>
  <text x="285" y="2120" fill="#7b5cb8" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="3">STATUS</text>
  <text x="285" y="2176" fill="#1e0a4f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="34" font-weight="600">Ready. Default recipient is set.</text>

  <!-- Feature strip -->
  <rect x="110" y="2510" width="1070" height="136" rx="40" fill="#ffffff" opacity="0.88"/>
  <text x="155" y="2586" fill="#4c1d95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">One-time setup</text>
  <text x="530" y="2586" fill="#4c1d95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Auto-routing</text>
  <text x="840" y="2586" fill="#4c1d95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Zero friction</text>
</svg>
