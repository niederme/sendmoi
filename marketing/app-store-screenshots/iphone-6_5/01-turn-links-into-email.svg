<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f8ff"/>
      <stop offset="45%" stop-color="#d9e9ff"/>
      <stop offset="100%" stop-color="#bdd1ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#153c8a"/>
      <stop offset="100%" stop-color="#081a42"/>
    </linearGradient>
    <linearGradient id="button" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <circle cx="1120" cy="280" r="220" fill="#7c3aed" opacity="0.09"/>
  <circle cx="180" cy="2430" r="280" fill="#2563ff" opacity="0.08"/>

  <text x="110" y="250" fill="#17306d" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="6">MAILMOI</text>

  <text x="110" y="470" fill="#0b1d45" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="136" font-weight="800">Turn Every Link</text>
  <text x="110" y="610" fill="#0b1d45" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="136" font-weight="800">Into A Clean Email</text>
  <text x="110" y="730" fill="#31456f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">Share once. MailMoi formats the title, excerpt,</text>
  <text x="110" y="798" fill="#31456f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">and link for Gmail in a single polished send.</text>

  <rect x="145" y="930" width="1000" height="1440" rx="120" fill="#0d1734"/>
  <rect x="181" y="970" width="928" height="1360" rx="86" fill="#f8fbff"/>
  <rect x="500" y="1005" width="290" height="18" rx="9" fill="#d8e3f8"/>

  <text x="245" y="1125" fill="#15306a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="54" font-weight="700">MailMoi</text>

  <rect x="245" y="1180" width="800" height="250" rx="38" fill="#ffffff" stroke="#d5e2fb" stroke-width="6"/>
  <text x="285" y="1248" fill="#5e7195" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="3">ACCOUNT</text>
  <text x="285" y="1315" fill="#0d214e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="600">Default Recipient</text>
  <rect x="285" y="1345" width="720" height="52" rx="16" fill="#eef4ff"/>
  <text x="314" y="1382" fill="#4f6694" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28">founder@studio.com</text>

  <rect x="245" y="1468" width="800" height="520" rx="38" fill="#ffffff" stroke="#d5e2fb" stroke-width="6"/>
  <text x="285" y="1536" fill="#5e7195" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="3">COMPOSE</text>
  <text x="285" y="1604" fill="#0d214e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="600">Title</text>
  <rect x="285" y="1632" width="720" height="56" rx="16" fill="#eef4ff"/>
  <text x="314" y="1670" fill="#15306a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28">How founders keep their inbox clean</text>
  <text x="285" y="1746" fill="#0d214e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="600">Excerpt</text>
  <rect x="285" y="1774" width="720" height="112" rx="20" fill="#eef4ff"/>
  <text x="314" y="1815" fill="#5a6f95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">Turn links into a lightweight briefing email with</text>
  <text x="314" y="1849" fill="#5a6f95" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">title, context, and the original source attached.</text>
  <rect x="285" y="1918" width="720" height="58" rx="18" fill="url(#button)"/>
  <text x="497" y="1957" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">QUEUE AND SEND</text>

  <rect x="245" y="2028" width="800" height="182" rx="38" fill="url(#hero)"/>
  <circle cx="315" cy="2119" r="22" fill="#34d399"/>
  <text x="360" y="2105" fill="#d8e7ff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">STATUS</text>
  <text x="360" y="2160" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="38" font-weight="600">Signed in. One tap sends the full story.</text>

  <rect x="110" y="2496" width="1070" height="150" rx="44" fill="#ffffff" opacity="0.9"/>
  <text x="155" y="2572" fill="#15306a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Gmail native sign-in</text>
  <text x="565" y="2572" fill="#15306a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">Rich title + excerpt</text>
  <text x="945" y="2572" fill="#15306a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">One tap send</text>
</svg>
