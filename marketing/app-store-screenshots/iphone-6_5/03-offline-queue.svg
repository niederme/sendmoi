<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eefcf7"/>
      <stop offset="50%" stop-color="#d5f6e9"/>
      <stop offset="100%" stop-color="#b8ecd6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f5132"/>
      <stop offset="100%" stop-color="#082a1b"/>
    </linearGradient>
    <linearGradient id="action" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg)"/>
  <circle cx="1060" cy="380" r="240" fill="#10b981" opacity="0.08"/>
  <circle cx="230" cy="2440" r="290" fill="#0f766e" opacity="0.06"/>

  <text x="110" y="250" fill="#115e3a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="6">MAILMOI</text>

  <text x="110" y="470" fill="#082c1e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="132" font-weight="800">Offline Queue</text>
  <text x="110" y="608" fill="#082c1e" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="132" font-weight="800">Never Drops A Send</text>
  <text x="110" y="726" fill="#35624f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">Save now, send later. MailMoi keeps your links,</text>
  <text x="110" y="794" fill="#35624f" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="52" font-weight="500">then retries automatically when you're back online.</text>

  <rect x="118" y="940" width="1060" height="1510" rx="92" fill="#ffffff" stroke="#d3efe2" stroke-width="8"/>

  <rect x="170" y="1012" width="960" height="186" rx="42" fill="url(#panel)"/>
  <circle cx="242" cy="1105" r="20" fill="#34d399"/>
  <text x="286" y="1089" fill="#d8ffef" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="3">STATUS</text>
  <text x="286" y="1150" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="42" font-weight="600">Offline detected. Everything is safely queued.</text>

  <text x="170" y="1328" fill="#4a7d68" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="3">PENDING EMAILS</text>

  <rect x="170" y="1380" width="960" height="214" rx="38" fill="#f7fffb" stroke="#cdeedd" stroke-width="6"/>
  <text x="212" y="1452" fill="#0c3121" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="700">How elite teams handle async updates</text>
  <text x="212" y="1508" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30">To: founder@studio.com</text>
  <text x="212" y="1556" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">mailmoi.app/blog/async-updates</text>
  <text x="212" y="1600" fill="#d97706" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Waiting for connection</text>

  <rect x="170" y="1628" width="960" height="214" rx="38" fill="#f7fffb" stroke="#cdeedd" stroke-width="6"/>
  <text x="212" y="1700" fill="#0c3121" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="700">A field guide to better founder notes</text>
  <text x="212" y="1756" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30">To: ops@studio.com</text>
  <text x="212" y="1804" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">mailmoi.app/blog/founder-notes</text>
  <text x="212" y="1848" fill="#d97706" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Saved to offline queue</text>

  <rect x="170" y="1876" width="960" height="214" rx="38" fill="#f7fffb" stroke="#cdeedd" stroke-width="6"/>
  <text x="212" y="1948" fill="#0c3121" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="40" font-weight="700">Building products people open daily</text>
  <text x="212" y="2004" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30">To: product@studio.com</text>
  <text x="212" y="2052" fill="#547968" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26">mailmoi.app/blog/daily-products</text>
  <text x="212" y="2096" fill="#d97706" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="700">Retry scheduled automatically</text>

  <rect x="170" y="2170" width="960" height="120" rx="34" fill="url(#action)"/>
  <text x="498" y="2248" fill="#ffffff" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="42" font-weight="800">SEND QUEUED NOW</text>

  <rect x="110" y="2510" width="1070" height="136" rx="40" fill="#ffffff" opacity="0.85"/>
  <text x="155" y="2586" fill="#115e3a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Durable queue</text>
  <text x="450" y="2586" fill="#115e3a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Automatic retries</text>
  <text x="810" y="2586" fill="#115e3a" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">No dropped links</text>
</svg>
